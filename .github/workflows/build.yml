name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Flet
      run: |
        pip install flet
    
    - name: Build APK
      run: |
        flet build apk --org com.example.anketa
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: anketa-app
        path: build/apk/
